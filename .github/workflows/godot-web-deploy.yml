name: Godot Web Export & Deploy

on:
  workflow_call:
    inputs:
      godot_version:
        type: string
        default: "4.6"
      export_preset:
        type: string
        default: "Web"
      export_dir:
        type: string
        default: "build/web"
    secrets:
      DEPLOY_SSH_KEY: { required: true }
      DEPLOY_PATH:    { required: true }
      PROXY_HOST:     { required: true }
      PROXY_USER:     { required: true }
      DEPLOY_HOST:    { required: true }
      DEPLOY_USER:    { required: true }

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:${{ inputs.godot_version }}
    env:
      GODOT_VERSION: ${{ inputs.godot_version }}
      EXPORT_PRESET: ${{ inputs.export_preset }}
      EXPORT_DIR: ${{ inputs.export_dir }}
      KEY: ${{ github.workspace }}/deploy_key/github_deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          if [ "$HOME" != "/root" ]; then
            mv /root/.config/godot ~/.config/godot
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
               ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          fi

      - name: Export Web build
        run: |
          mkdir -v -p "$EXPORT_DIR"
          godot --headless --verbose \
            --export-release "$EXPORT_PRESET" "$EXPORT_DIR/index.html"

      - name: Generate version metadata
        shell: bash
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        run: |
          command -v jq >/dev/null || { apt-get update && apt-get install -y --no-install-recommends jq; }
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          COMMIT_MESSAGE="${HEAD_COMMIT_MESSAGE:-$(git log -1 --pretty=%B)}"
          AUTHOR="${ACTOR:-$(git log -1 --pretty=%an)}"
          jq -n \
            --arg version        "$GITHUB_SHA" \
            --arg short_version  "$(echo "$GITHUB_SHA" | cut -c1-7)" \
            --arg branch         "$GITHUB_REF_NAME" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg author         "$AUTHOR" \
            --arg commit_date    "$(git log -1 --pretty=%cI)" \
            --arg build_date     "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg repository     "$GITHUB_REPOSITORY" \
            --arg run_number     "$GITHUB_RUN_NUMBER" \
            --arg run_id         "$GITHUB_RUN_ID" \
            '$ARGS.named' > "$EXPORT_DIR/version.json"
          cat "$EXPORT_DIR/version.json"

      - name: Install ssh client
        run: |
          apt-get update
          apt-get install -y --no-install-recommends openssh-client rsync

      - name: Generate deployment path
        id: path
        run: |
          REPO_NAME="$(basename "$GITHUB_REPOSITORY")"
          SHORT_SHA="$(echo "$GITHUB_SHA" | cut -c1-7)"
          echo "repo_name=${REPO_NAME}"                                   >> "$GITHUB_OUTPUT"
          echo "remote_path=${{ secrets.DEPLOY_PATH }}/${REPO_NAME}/${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH key and config
        run: |
          mkdir -p deploy_key ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > "$KEY"
          chmod 600 "$KEY"
          cat > ~/.ssh/config <<EOF
          Host bastion
              HostName ${{ secrets.PROXY_HOST }}
              User ${{ secrets.PROXY_USER }}
              IdentityFile $KEY
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null

          Host deploytarget
              HostName ${{ secrets.DEPLOY_HOST }}
              User ${{ secrets.DEPLOY_USER }}
              IdentityFile $KEY
              ProxyJump bastion
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy via proxy (rsync)
        run: |
          rsync -avz --delete --mkpath \
            -e "ssh -F $HOME/.ssh/config" \
            "$EXPORT_DIR/" \
            deploytarget:${{ steps.path.outputs.remote_path }}/

      - name: Update current symlink
        run: |
          ssh -F "$HOME/.ssh/config" deploytarget \
              "ln -sfn '${{ steps.path.outputs.remote_path }}' \
                       '${{ secrets.DEPLOY_PATH }}/${{ steps.path.outputs.repo_name }}/current'"
